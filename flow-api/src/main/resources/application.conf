ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
    }
    application {
        modules = [ com.flow.ApplicationKt.module ]
    }
}

database {
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = ${?JWT_SECRET}
    issuer = "flow-api"
    audience = "flow-api"
    realm = "Flow API"
}

morpho {
    apiUrl = "https://api.morpho.org/graphql"
}

aave {
    apiUrl = "https://aave-api-v2.aave.com"
}

flow {
    tokenPrefix = "sk_live_"
    defaultYieldRate = 0.06
}

encryption {
    masterKey = ${?MASTER_ENCRYPTION_KEY}
}

ethereum {
    sandbox {
        rpcUrl = ${?ETH_SANDBOX_RPC_URL}
        chainId = 11155111  # Sepolia testnet
        morphoAddress = "0x0000000000000000000000000000000000000000"  # TODO: Get testnet address
        aaveAddress = "0x0000000000000000000000000000000000000000"  # TODO: Get testnet address
    }
    production {
        rpcUrl = ${?ETH_PRODUCTION_RPC_URL}
        chainId = 1  # Ethereum mainnet
        morphoAddress = "0xBBBBBbbBBb9cC5e90e3b3Af64bdAF62C37EEFFCb"  # Morpho Blue mainnet
        aaveAddress = "0x87870Bca3F3fD6335C3F4ce8392D69350B4fA4E2"  # Aave v3 Pool mainnet
    }
}
