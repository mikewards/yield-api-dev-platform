    <!-- Sign In Section -->
    <section class="account-section">
        <div class="container">
            <div class="account-container">
                <div class="account-header">
                    <h1>Sign In to TBD</h1>
                    <p>Access your dashboard and manage your DeFi yield accounts.</p>
                </div>

                <form class="account-form" id="signinForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required placeholder="your_username">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-primary btn-large btn-full">Sign In</button>
                </form>

    <script>
        const API_BASE_URL = 'https://tbd-platform-production.up.railway.app';
        
        // Check if already logged in
        const existingToken = localStorage.getItem(.*tbd_token');
        if (existingToken) {
            window.location.href = 'dashboard.html';
        }
        
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing In...';
            
            const formData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/v1/auth/authenticate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem(.*tbd_token', data.access_token);
                    localStorage.setItem(.*tbd_account_id', data.account_id);
                    localStorage.setItem(.*tbd_username', formData.username);
                    localStorage.setItem(.*tbd_token_expires', Date.now() + (data.expires_in * 1000));
                    
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    showErrorMessage(data.error?.message || 'Invalid username or password');
                }
            } catch (error) {
                console.error('Error signing in:', error);
                showErrorMessage('Unable to connect to the server. Please ensure the API is running.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
        
        function showErrorMessage(message) {
            const existingError = document.querySelector('.error-message');
            if (existingError) {
                existingError.remove();
            }
            
            const form = document.getElementById('signinForm');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="#EF4444" stroke-width="2"/>
                    <path d="M12 8v4M12 16h.01" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>${message}</span>
            `;
            form.insertBefore(errorDiv, form.firstChild);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }
    </script>
