<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBD Applications SDK - Basic Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        #applications-container {
            margin-top: 40px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>TBD Applications SDK Example</h1>
    <p>This example demonstrates how to embed the TBD Applications SDK into your application.</p>
    
    <div id="applications-container"></div>

    <script type="module">
        import { FlowApplications } from '../src/index.ts';

        const applications = new FlowApplications({
            apiKey: 'sk_live_YOUR_API_KEY_HERE',
            container: '#applications-container',
            theme: 'light',
            onApplicationCreated: (app) => {
                console.log('Application created:', app);
                alert(`Application "${app.name}" created successfully!`);
            },
            onApplicationUpdated: (app) => {
                console.log('Application updated:', app);
            }
        });

        applications.render();
    </script>
</body>
</html>
